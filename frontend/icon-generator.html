<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>App Icon Generator</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .icon-container {
            text-align: center;
            margin: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <h1>💰 記帳本 App 圖示生成器</h1>
    <p>點擊按鈕下載對應尺寸的圖示</p>

    <div class="icon-container">
        <h3>192x192 圖示</h3>
        <canvas id="canvas192" width="192" height="192"></canvas>
        <br>
        <button onclick="downloadIcon(192)">下載 icon-192.png</button>
    </div>

    <div class="icon-container">
        <h3>512x512 圖示</h3>
        <canvas id="canvas512" width="512" height="512"></canvas>
        <br>
        <button onclick="downloadIcon(512)">下載 icon-512.png</button>
    </div>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');

            // 背景漸層
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // 繪製錢幣圖示
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(size * 0.5, size * 0.5, size * 0.3, 0, Math.PI * 2);
            ctx.fill();

            // 繪製 $ 符號
            ctx.fillStyle = '#667eea';
            ctx.font = `bold ${size * 0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', size * 0.5, size * 0.5);

            // 繪製外圈
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = size * 0.04;
            ctx.beginPath();
            ctx.arc(size * 0.5, size * 0.5, size * 0.38, 0, Math.PI * 2);
            ctx.stroke();
        }

        // 繪製圖示
        drawIcon(document.getElementById('canvas192'), 192);
        drawIcon(document.getElementById('canvas512'), 512);

        function downloadIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
