name: E2E Tests

on:
  push:
    branches: [main, develop, claude/**]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Start Backend Server
        run: |
          cd backend
          python main.py &
          sleep 10
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
          JWT_SECRET: test-jwt-secret-key-for-e2e
          ADMIN_SECRET: test-admin-secret-key
          GMAIL_USER: test@example.com
          GMAIL_APP_PASSWORD: test-password
          TESTING: true

      - name: Verify Backend is Running
        run: |
          curl -f http://localhost:5001/api/health || curl -f http://localhost:5001/ || echo "Backend may not have health endpoint"

      - name: Run E2E Tests
        run: |
          cd frontend
          npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:8080

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 30

      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'frontend/test-results/results.json';

            if (fs.existsSync(path)) {
              const results = JSON.parse(fs.readFileSync(path, 'utf8'));
              const { suites } = results;

              let passed = 0;
              let failed = 0;
              let skipped = 0;

              // Count test results
              function countTests(suite) {
                for (const spec of suite.specs || []) {
                  for (const test of spec.tests || []) {
                    if (test.status === 'passed') passed++;
                    else if (test.status === 'failed') failed++;
                    else if (test.status === 'skipped') skipped++;
                  }
                }
                for (const child of suite.suites || []) {
                  countTests(child);
                }
              }

              countTests(suites[0]);

              const body = `## 🧪 E2E Test Results

              - ✅ Passed: ${passed}
              - ❌ Failed: ${failed}
              - ⏭️ Skipped: ${skipped}
              - **Total**: ${passed + failed + skipped}

              ${failed > 0 ? '⚠️ Some tests failed. Please check the test report.' : '✨ All tests passed!'}

              [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  e2e-tests-firefox:
    name: E2E Tests (Firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          npx playwright install firefox --with-deps

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Start Backend Server
        run: |
          cd backend
          python main.py &
          sleep 10
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
          JWT_SECRET: test-jwt-secret-key-for-e2e
          TESTING: true

      - name: Run E2E Tests (Firefox)
        run: |
          cd frontend
          npx playwright test --project=firefox

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-firefox
          path: frontend/playwright-report/
          retention-days: 7
