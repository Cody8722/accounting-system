version: '3.8'

services:
  # MongoDB 服務
  mongodb:
    image: mongo:6.0
    container_name: accounting-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - accounting-network

  # 後端服務
  backend:
    build: ./backend
    container_name: accounting-backend
    ports:
      - "5001:8080"
    environment:
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/accounting_db?authSource=admin
      - JWT_SECRET=dev_jwt_secret_key_for_local_testing_only
      - ADMIN_SECRET=dev_admin_secret_for_local_testing
      - PORT=8080
      - TESTING=false
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - accounting-network
    command: python main.py

  # 前端服務（靜態文件服務器）
  frontend:
    image: nginx:alpine
    container_name: accounting-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - accounting-network

volumes:
  mongodb_data:

networks:
  accounting-network:
    driver: bridge
